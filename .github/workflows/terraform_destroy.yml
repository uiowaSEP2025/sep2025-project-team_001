name: Destroy Resources in AWS

on:
  workflow_dispatch: # Manually trigger the workflow

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v2

      # Set up AWS credentials for Terraform
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Install Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "1.0.0"

      # Run Terraform to destroy the resources (destroy specific resources)
      - name: Terraform Destroy (Destroy Resources)
        run: |
          cd infrastructure
          terraform init
          terraform destroy -auto-approve -target=aws_vpc.main_vpc -target=aws_subnet.main_subnet_1 -target=aws_subnet.main_subnet_2 -target=aws_internet_gateway.igw -target=aws_route_table.public_rt -target=aws_route_table_association.public_rt_assoc_1 -target=aws_route_table_association.public_rt_assoc_2 -target=aws_db_subnet_group.rds_subnet_group -target=aws_db_instance.postgres
